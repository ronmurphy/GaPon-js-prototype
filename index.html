<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GaPon — daily capsule machines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400..700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <span class="brand">GaPon</span>
    <span class="tagline">daily capsule machines</span>
    <span class="hchip coin-chip"><span class="msr">toll</span><span id="coin-count">0</span></span>
    <span class="hchip streak-chip"><span class="msr">local_fire_department</span><span id="streak-count">0</span></span>
  </header>

  <nav class="tabs">
    <button data-tab="machines" class="active"><span class="msr">featured_seasonal_and_gifts</span>Machines</button>
    <button data-tab="album"><span class="msr">auto_stories</span>Album</button>
    <button data-tab="market"><span class="msr">storefront</span>Market</button>
    <button data-tab="arcade"><span class="msr">sports_esports</span>Arcade</button>
  </nav>

  <main>
    <section id="tab-machines">
      <div class="machines-head">
        <h2>Today's Machines</h2>
        <span id="rotate-timer"></span>
      </div>
      <div id="machines"></div>
    </section>
    <section id="tab-album" hidden></section>
    <section id="tab-market" hidden></section>
    <section id="tab-arcade" hidden></section>
  </main>

  <div id="overlay" hidden></div>
  <div id="toasts"></div>

  <footer>
    <span id="stats"></span>
    <button id="reset-save">reset save</button>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/game.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/arcade.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
